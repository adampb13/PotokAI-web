<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotokAI - Lokalny Agent</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23000000' width='100' height='100'/><path fill='%230055cc' d='M30,50 Q50,30 70,50 T70,70 Q50,90 30,70 Z'/><circle fill='%230077ff' cx='50' cy='50' r='15'/></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000000, #0a0a0a);
            color: #d0d0d0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            padding: 30px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 85, 204, 0.15);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(45deg, #0077ff, #0055cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        #chat {
            height: 500px;
            border: 1px solid rgba(0, 85, 204, 0.2);
            border-radius: 15px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
            background: rgba(5, 5, 5, 0.9);
            box-shadow: inset 0 2px 15px rgba(0, 0, 0, 0.5);
        }

        #chat p {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 10px;
            line-height: 1.5;
        }

        #chat p b {
            color: #0077ff;
        }

        .dev-tools {
            background: rgba(5, 5, 5, 0.9);
            border: 1px solid rgba(0, 85, 204, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .dev-tools h3 {
            color: #0055cc;
            margin-bottom: 15px;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dev-tools h3::before {
            content: '⚙️';
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .info-item {
            background: rgba(0, 85, 204, 0.05);
            border-left: 3px solid #0077ff;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.95em;
        }

        .info-item-label {
            color: #0077ff;
            font-weight: 600;
            font-size: 0.85em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-item-value {
            color: #d0d0d0;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        #userInput {
            flex: 1;
            padding: 15px;
            background: rgba(15, 15, 15, 0.9);
            color: #d0d0d0;
            border: 1px solid rgba(0, 85, 204, 0.3);
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        #userInput:focus {
            border-color: #0077ff;
            box-shadow: 0 0 15px rgba(0, 119, 255, 0.4);
        }

        button {
            padding: 15px 25px;
            cursor: pointer;
            background: linear-gradient(45deg, #0055cc, #0077ff);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 85, 204, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 119, 255, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .file-group {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        #fileInput {
            flex: 1;
            padding: 10px;
            background: rgba(15, 15, 15, 0.9);
            color: #d0d0d0;
            border: 1px solid rgba(0, 85, 204, 0.3);
            border-radius: 15px;
            outline: none;
        }

        .reset-btn {
            background: linear-gradient(45deg, #cc0055, #ff004d);
            box-shadow: 0 4px 15px rgba(204, 0, 85, 0.4);
        }

        .reset-btn:hover {
            box-shadow: 0 6px 25px rgba(255, 0, 77, 0.5);
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            #chat {
                height: 400px;
            }

            .input-group, .file-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌊 PotokAI</h1>
        <div class="dev-tools">
            <h3>Informacje systemowe</h3>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-item-label">Status serwera</div>
                    <div class="info-item-value"><span class="status-indicator"></span><span id="serverStatus">Łączenie...</span></div>
                </div>
                <div class="info-item">
                    <div class="info-item-label">Model AI</div>
                    <div class="info-item-value" id="modelName">Wczytywanie...</div>
                </div>
                <div class="info-item">
                    <div class="info-item-label">Połączenie</div>
                    <div class="info-item-value" id="connectionInfo">127.0.0.1:3000</div>
                </div>
            </div>
        </div>
        <div id="chat"></div>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Zapytaj o kod...">
            <button onclick="askAI()">Wyślij</button>
        </div>
        <div class="file-group">
            <input type="file" id="fileInput">
            <button onclick="uploadFile()">Prześlij plik</button>
            <button onclick="resetContext()" class="reset-btn">Resetuj kontekst</button>
        </div>
    </div>

    <script>
        // Funkcja do pobierania informacji o serwerze
        async function loadServerInfo() {
            try {
                const response = await fetch('/api/info');
                const data = await response.json();
                document.getElementById('serverStatus').textContent = data.status === 'connected' ? 'Połączono' : 'Rozłączono';
                document.getElementById('modelName').textContent = data.model;
            } catch (error) {
                document.getElementById('serverStatus').textContent = 'Błąd';
                console.error('Error fetching server info:', error);
            }
        }

        // Wczytaj informacje o serwerze przy starcie
        window.addEventListener('load', loadServerInfo);

        async function askAI() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const prompt = input.value;

            if (!prompt.trim()) return;

            chat.innerHTML += `<p><b>Ty:</b> ${prompt}</p>`;
            const aiMessageP = document.createElement('p');
            aiMessageP.innerHTML = "<b>AI:</b> ";
            chat.appendChild(aiMessageP);

            input.value = '';

            const response = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ prompt })
            });

            // Czytamy strumień danych
            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                aiMessageP.innerHTML += chunk; // Dodajemy słowo po słowie do akapitu
                chat.scrollTop = chat.scrollHeight; // Autoscroll
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) {
                alert('Wybierz plik.');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });

            const result = await response.text();
            alert(result);
            fileInput.value = '';
        }

        async function resetContext() {
            const response = await fetch('/reset', {
                method: 'POST'
            });
            const result = await response.text();
            alert(result);
            document.getElementById('chat').innerHTML = '';
        }
    </script>
</body>
</html>
