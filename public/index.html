<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Lokalne AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(30, 30, 30, 0.9);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(45deg, #00d4ff, #007bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #chat {
            height: 500px;
            border: 1px solid #444;
            border-radius: 15px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
            background: rgba(20, 20, 20, 0.8);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        #chat p {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 10px;
            line-height: 1.5;
        }

        #chat p b {
            color: #00d4ff;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        #userInput {
            flex: 1;
            padding: 15px;
            background: rgba(40, 40, 40, 0.9);
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        #userInput:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        button {
            padding: 15px 25px;
            cursor: pointer;
            background: linear-gradient(45deg, #007bff, #00d4ff);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .file-group {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        #fileInput {
            flex: 1;
            padding: 10px;
            background: rgba(40, 40, 40, 0.9);
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 15px;
            outline: none;
        }

        .reset-btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .reset-btn:hover {
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            #chat {
                height: 400px;
            }

            .input-group, .file-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Lokalny Agent AI</h1>
        <div id="chat"></div>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Zapytaj o kod...">
            <button onclick="askAI()">Wyślij</button>
        </div>
        <div class="file-group">
            <input type="file" id="fileInput">
            <button onclick="uploadFile()">Prześlij plik</button>
            <button onclick="resetContext()" class="reset-btn">Resetuj kontekst</button>
        </div>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const prompt = input.value;

            if (!prompt.trim()) return;

            chat.innerHTML += `<p><b>Ty:</b> ${prompt}</p>`;
            const aiMessageP = document.createElement('p');
            aiMessageP.innerHTML = "<b>AI:</b> ";
            chat.appendChild(aiMessageP);

            input.value = '';

            const response = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ prompt })
            });

            // Czytamy strumień danych
            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                aiMessageP.innerHTML += chunk; // Dodajemy słowo po słowie do akapitu
                chat.scrollTop = chat.scrollHeight; // Autoscroll
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) {
                alert('Wybierz plik.');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });

            const result = await response.text();
            alert(result);
            fileInput.value = '';
        }

        async function resetContext() {
            const response = await fetch('/reset', {
                method: 'POST'
            });
            const result = await response.text();
            alert(result);
            document.getElementById('chat').innerHTML = '';
        }
    </script>
</body>
</html>
