<!DOCTYPE html>
<html>
<head>
    <title>Moje Lokalne AI</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; background: #1a1a1a; color: white; }
        #chat { height: 400px; border: 1px solid #444; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        input { width: 80%; padding: 10px; background: #333; color: white; border: none; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; margin: 5px; }
        #fileInput { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Lokalny Agent AI</h1>
    <div id="chat"></div>
    <input type="text" id="userInput" placeholder="Zapytaj o kod...">
    <button onclick="askAI()">Wyślij</button>
    <br>
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Prześlij plik</button>
    <button onclick="resetContext()">Resetuj kontekst</button>

    <script>
        async function askAI() {
    const input = document.getElementById('userInput');
    const chat = document.getElementById('chat');
    const prompt = input.value;
    
    chat.innerHTML += `<p><b>Ty:</b> ${prompt}</p>`;
    const aiMessageP = document.createElement('p');
    aiMessageP.innerHTML = "<b>AI: </b>";
    chat.appendChild(aiMessageP);
    
    input.value = '';

    const response = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ prompt })
    });

    // Czytamy strumień danych
    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        aiMessageP.innerHTML += chunk; // Dodajemy słowo po słowie do akapitu
        chat.scrollTop = chat.scrollHeight; // Autoscroll
    }
}

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) {
                alert('Wybierz plik.');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });

            const result = await response.text();
            alert(result);
            fileInput.value = '';
        }

        async function resetContext() {
            const response = await fetch('/reset', {
                method: 'POST'
            });
            const result = await response.text();
            alert(result);
            document.getElementById('chat').innerHTML = '';
        }
    </script>
</body>
</html>
